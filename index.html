    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: linear-gradient(135deg, #145A4A 0%, #1E6B5C 40%, #2A9D8F 75%, #7CB342 100%);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #app-splash.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-splash img {
        width: 5.5rem;
        height: 5.5rem;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        border: 3px solid rgba(255, 255, 255, 0.35);
      }
      #app-splash p {
        margin: 0;
        color: rgba(255, 255, 255, 0.95);
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      #app-splash .splash-bar {
        width: 2rem;
        height: 2rem;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: white;
        border-radius: 50%;
        animation: splash-spin 0.75s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
